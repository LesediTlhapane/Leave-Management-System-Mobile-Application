name: wil 
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ Firebase Core (correct version)
  firebase_core: ^4.2.0

  # ✅ Firestore (compatible with firebase_core 4.x)
  cloud_firestore: ^6.0.3

  # ✅ Firebase Storage (correct version + caret)
  firebase_storage: ^13.0.3

  # ✅ (Recommended) Firebase Auth for future login sync
  firebase_auth: ^6.1.2   # <-- Updated to fix version conflict

  # ✅ File picker for choosing images/docs
  file_picker: ^8.0.3

  # ✅ For efficient profile image loading
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
